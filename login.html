<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 로그인 · 한배미마을</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ===== 헤더 ===== -->
  <header class="site-header">
    <div class="container">
      <nav class="nav">
        <a href="index.html" class="nav__logo" aria-label="한배미마을 홈">
          <img src="images/logo.png" alt="한배미마을 HanBaeMi Farm">
        </a>
      </nav>
    </div>
  </header>

  <!-- ===== 로그인 폼 ===== -->
  <section class="section" style="min-height:calc(100vh - 140px);display:flex;align-items:center;">
    <div class="container">
      <div class="login-box">

        <div style="text-align:center;margin-bottom:32px;">
          <span class="section-label">관리자 전용</span>
          <h1 style="font-family:'Noto Serif KR',serif;font-size:1.6rem;font-weight:700;margin-top:8px;">
            공지사항 관리자 로그인
          </h1>
          <p style="font-size:0.88rem;color:var(--text-muted);margin-top:6px;">
            등록된 관리자 계정으로만 접근할 수 있습니다.
          </p>
        </div>

        <!-- 오류/안내 메시지 -->
        <div id="loginMsg" class="admin-msg" style="display:none;margin-bottom:16px;"></div>

        <form id="loginForm" novalidate>
          <div class="form-group" style="margin-bottom:16px;">
            <label class="form-label" for="loginEmail">이메일</label>
            <input id="loginEmail" type="email" class="form-input" placeholder="이메일 주소" required autocomplete="email">
          </div>
          <div class="form-group" style="margin-bottom:24px;">
            <label class="form-label" for="loginPassword">비밀번호</label>
            <input id="loginPassword" type="password" class="form-input" placeholder="비밀번호" required autocomplete="current-password">
          </div>

          <button type="submit" id="btnLogin" class="btn btn--primary" style="width:100%;margin-bottom:10px;">
            로그인
          </button>
          <button type="button" id="btnSignup" class="btn btn--outline" style="width:100%;">
            회원가입
          </button>
        </form>

        <p style="text-align:center;font-size:0.8rem;color:var(--text-muted);margin-top:20px;">
          회원가입 후에도 관리자 권한은 별도 등록이 필요합니다.
        </p>
        <div style="text-align:center;margin-top:16px;">
          <a href="index.html" style="font-size:0.85rem;color:var(--text-muted);">← 홈으로 돌아가기</a>
        </div>

      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      // 이미 로그인+관리자이면 바로 관리 페이지로
      const session = await authGetSession();
      if (session && await authIsAdmin(session)) {
        location.href = 'notice-admin.html';
        return;
      }

      const form     = document.getElementById('loginForm');
      const msgEl    = document.getElementById('loginMsg');
      const btnLogin = document.getElementById('btnLogin');

      function showMsg(text, type) {
        msgEl.textContent = text;
        msgEl.className   = 'admin-msg admin-msg--' + type;
        msgEl.style.display = 'block';
      }

      function setLoading(on) {
        btnLogin.disabled    = on;
        btnLogin.textContent = on ? '처리 중...' : '로그인';
      }

      // 로그인
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email    = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        if (!email || !password) { showMsg('이메일과 비밀번호를 입력해 주세요.', 'error'); return; }

        setLoading(true);
        const { data, error } = await authSignIn(email, password);
        setLoading(false);

        if (error) { showMsg('로그인 실패: ' + error.message, 'error'); return; }

        // 관리자 여부 확인
        const isAdmin = await authIsAdmin(data.session);
        if (!isAdmin) {
          await authSignOut();
          showMsg('관리자 권한이 없습니다. 담당자에게 문의하세요.', 'error');
          return;
        }
        location.href = 'notice-admin.html';
      });

      // 회원가입
      document.getElementById('btnSignup').addEventListener('click', async () => {
        const email    = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        if (!email || !password) { showMsg('이메일과 비밀번호를 입력해 주세요.', 'error'); return; }
        if (password.length < 6)  { showMsg('비밀번호는 6자 이상이어야 합니다.', 'error'); return; }

        setLoading(true);
        const { error } = await authSignUp(email, password);
        setLoading(false);

        if (error) { showMsg('회원가입 실패: ' + error.message, 'error'); return; }
        showMsg('가입 완료! 이메일 인증 후 관리자가 권한을 부여하면 접근 가능합니다.', 'success');
      });
    });
  </script>

</body>
</html>
